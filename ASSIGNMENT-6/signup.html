<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup - Adhya Fashion</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="auth-box shadow p-4">
        <h2 class="text-center mb-4">Create Account ✨</h2>

        <input type="text" id="signupName" class="form-control mb-3" placeholder="Full Name">
        <input type="email" id="signupEmail" class="form-control mb-3" placeholder="Email">
        <input type="password" id="signupPassword" class="form-control mb-3" placeholder="Password">

        <button class="btn btn-dark w-100 mb-3" onclick="signupUser()">Signup</button>

        <p class="text-center">
            Already have an account? 
            <a href="login.html">Login</a>
        </p>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
